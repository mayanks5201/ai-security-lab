name: Security CI

on: [push]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mayanks5201_ai-security-lab
            -Dsonar.organization=mayanks5201

  snyk-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high

  trivy-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  zap-scan:
    runs-on: ubuntu-latest
    name: OWASP ZAP DAST Scan
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install uvicorn fastapi requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Start FastAPI App
        run: |
          # Start app and capture both stdout and stderr
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
          
          echo "Waiting for FastAPI to start..."
          for i in {1..15}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "FastAPI is UP and running!"
              exit 0
            fi
            echo "Attempt $i: Server not ready yet..."
            sleep 2
          done
          
          echo "FATAL ERROR: FastAPI failed to start within 30 seconds."
          echo "--- UVICORN LOGS ---"
          cat uvicorn.log
          exit 1

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000/'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
